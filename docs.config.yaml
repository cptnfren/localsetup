# Repo local documentation configuration.
# The docs-organization skill must work without this file.
# When present, these settings take precedence over heuristics and the category manifest.

root: "docs/"

categories:
  runbook:
    slug: "incident-runbooks"
    description: "Incident response and operational runbooks."
  architecture:
    slug: "architecture"
    description: "Architecture overviews and design documentation."

aliases:
  incident_runbook: "runbook"
  guide: "how_to"

required_front_matter_fields:
  - "status"
  - "last_updated"
  - "doc_type"
  - "tags"

# Optional configuration for the docs organization skill.
#
# This file is not required. The skill works without it, using heuristics and
# docs/.docs-classifications.yaml to choose categories and paths.
#
# Fields:
# - root: docs root path. Default is "docs/" when unset.
# - categories: map from category_label to slug and description.
# - aliases: map from alternate labels to canonical labels.
# - required_front_matter_fields: extra metadata fields required by this repo.

root: "docs/"

categories: {}

aliases: {}

required_front_matter_fields: []

