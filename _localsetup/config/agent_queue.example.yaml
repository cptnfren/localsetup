# Agent Q queue config (optional)
# Copy to agent_queue.yaml (gitignored if local-only) or merge into repo-local config.
# See AGENTIC_AGENT_Q_BIDIRECTIONAL_BUILD_SPEC.md and AGENTIC_AGENT_TO_AGENT_PROTOCOL.md

layout: structured           # flat | structured
queue_path: .agent/queue      # Root for inbox | in | out | pending | archive
agent_trust_registry_path: _localsetup/config/agent_trust_registry.yaml

transports_enabled:
  - mail
  - file_drop

version_mismatch_policy: warn  # warn | block | allow_log

# Mail post-ingest folder (IMAP move after promote)
post_ingest_mailbox: LocalsetupAgentQ/Processed

# file_drop defaults
sealed_extension: .agentq.asc
ignore_globs:
  - "*conflicted copy*"
  - "*.tmp"
  - "~*"

archive_retention_days: 90
archive_max_total_gb: 10
