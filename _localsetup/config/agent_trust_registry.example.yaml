# Agent trust registry (paths to public keys only; private keys never in repo)
# Copy to agent_trust_registry.yaml and set local_agent_id + agent entries.
# See AGENTIC_AGENT_TO_AGENT_PROTOCOL.md

version: 1
local_agent_id: agent-a

agents:
  agent-b:
    display_name: "Agent B builder"
    # Single key:
    public_key_path: /secure/keys/agent-b.pub.asc
    # Or rotation (multiple keys); verify accepts any listed:
    # public_keys:
    #   - /secure/keys/agent-b.pub.asc
    #   - /secure/keys/agent-b.pub.v2.asc
    allowed_transports: [mail, file_drop]
    mail:
      accounts: [acct_b_mailbox]
    file_drop:
      allowed_inbound_roots:
        - /sync/agentq/incoming-from-b
      allowed_outbound_roots:
        - /sync/agentq/outgoing-to-b
